<svg width="48" height="48" xmlns="http://www.w3.org/2000/svg">
  <!-- Zealot - protoss warrior -->
  <g>
    <!-- Body -->
    <ellipse cx="24" cy="30" rx="10" ry="14" fill="#B8860B" stroke="#8B6914" stroke-width="2"/>
    <!-- Head crest -->
    <path d="M 24,10 L 20,18 L 28,18 Z" fill="#FFD700" stroke="#8B6914" stroke-width="2"/>
    <!-- Head -->
    <circle cx="24" cy="20" r="6" fill="#DAA520" stroke="#8B6914" stroke-width="2"/>
    <!-- Eyes (glowing) -->
    <circle cx="22" cy="20" r="1.5" fill="#00FFFF"/>
    <circle cx="26" cy="20" r="1.5" fill="#00FFFF"/>
    <!-- Psi blades (energy swords) -->
    <path d="M 12,28 L 8,26 L 6,28 L 8,30 Z" fill="#FFFF00" opacity="0.8" stroke="#FFD700" stroke-width="1"/>
    <path d="M 36,28 L 40,26 L 42,28 L 40,30 Z" fill="#FFFF00" opacity="0.8" stroke="#FFD700" stroke-width="1"/>
    <!-- Energy glow on blades -->
    <ellipse cx="7" cy="28" rx="4" ry="6" fill="#FFFF00" opacity="0.3"/>
    <ellipse cx="41" cy="28" rx="4" ry="6" fill="#FFFF00" opacity="0.3"/>
    <!-- Legs -->
    <rect x="18" y="42" width="4" height="4" fill="#8B6914"/>
    <rect x="26" y="42" width="4" height="4" fill="#8B6914"/>
  </g>
</svg>
