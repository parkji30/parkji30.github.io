<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Park — StarCraft: Brood War Edition</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="James Park — engineer working on optimization with JAX and Rust. StarCraft Brood War themed!">
</head>
<body>
    <!-- Full-screen canvas for StarCraft battle -->
    <canvas id="starcraft-canvas"></canvas>

    <div class="container">
        <header role="banner">
            <div class="header-inner">
                <h1 class="title">James Park</h1>
                <p class="subtitle">AI Engineer mixing with Quantum Computing</p>
                <nav class="nav" aria-label="Primary">
                    <a href="index.html">Home</a>
                    <a href="useful_links.html">Links</a>
                    <a href="https://github.com/parkji30/" target="_blank" rel="noopener">GitHub</a>
                    <a href="https://scholar.google.ca/citations?user=mpOVNKQAAAAJ&hl=en" target="_blank" rel="noopener">Scholar</a>
                    <a href="mailto:jp7dec23@gmail.com">Email</a>
                </nav>
            </div>
        </header>

        <main id="content" role="main">
        </main>
    </div>

    <!-- Load WASM module -->
    <script type="module">
        import init, { init_game, update_and_render, resize_game } from './pkg/starcraft_site.js';

        let animationFrameId = null;

        async function run() {
            try {
                await init();

                const canvas = document.getElementById('starcraft-canvas');
                const ctx = canvas.getContext('2d');

                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    resize_game(canvas.width, canvas.height);
                }

                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);

                init_game(canvas.width, canvas.height);

                function animate(timestamp) {
                    update_and_render('starcraft-canvas', timestamp);
                    animationFrameId = requestAnimationFrame(animate);
                }

                requestAnimationFrame(animate);

                console.log('StarCraft battle initialized! Watch the units fight!');
            } catch (error) {
                console.error('Error loading WASM:', error);
                const canvas = document.getElementById('starcraft-canvas');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#00ff41';
                ctx.font = '20px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('StarCraft battle loading...',
                    canvas.width / 2, canvas.height / 2);
            }
        }

        run();
    </script>
</body>
</html>
